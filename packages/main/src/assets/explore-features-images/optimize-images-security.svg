<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Container box -->
  <g transform="translate(80, 60)">
    <!-- Container body -->
    <rect x="0" y="40" width="160" height="120" rx="8" fill="url(#containerGrad)" opacity="0.9"/>
    
    <!-- Container top (lid) -->
    <rect x="-10" y="30" width="180" height="20" rx="4" fill="url(#containerGrad)"/>
    
    <!-- Container lines (shipping container style) -->
    <line x1="20" y1="50" x2="20" y2="150" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="60" y1="50" x2="60" y2="150" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="50" x2="100" y2="150" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="140" y1="50" x2="140" y2="150" stroke="#fff" stroke-width="2" opacity="0.3"/>
    
    <!-- Container icon (cube) -->
    <g transform="translate(65, 80)">
      <path d="M15 0 L30 8 L30 24 L15 32 L0 24 L0 8 Z" fill="#fff" opacity="0.4"/>
      <path d="M15 0 L30 8 L15 16 L0 8 Z" fill="#fff" opacity="0.6"/>
      <path d="M15 16 L15 32 L0 24 L0 8 Z" fill="#fff" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Lock icon -->
  <g transform="translate(260, 100)">
    <!-- Lock body -->
    <rect x="0" y="40" width="80" height="60" rx="8" fill="url(#lockGrad)"/>
    
    <!-- Lock shackle -->
    <path d="M15 40 L15 25 C15 10 25 0 40 0 C55 0 65 10 65 25 L65 40" 
          stroke="url(#lockGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="40" cy="65" r="8" fill="#fff" opacity="0.9"/>
    <rect x="36" y="65" width="8" height="15" rx="2" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Shield accent -->
  <g transform="translate(180, 180)">
    <path d="M20 0 L40 5 L40 25 C40 40 20 50 20 50 C20 50 0 40 0 25 L0 5 Z" 
          fill="#22c55e" opacity="0.3"/>
    <path d="M15 20 L18 23 L28 13" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="250" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="70" cy="260" r="3" fill="#22c55e" opacity="0.5"/>
  <circle cx="350" cy="50" r="5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="370" cy="70" r="3" fill="#22c55e" opacity="0.4"/>
  
  <!-- Text hint -->
  <text x="200" y="270" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Secure Container Images
  </text>
</svg>
