name: Git Bisect Kind Test

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  git-bisect-kind:
    name: Git bisect kind.spec.ts
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full history needed for git bisect

      - name: Install Podman v5 using external action
        uses: redhat-actions/podman-install@aea6ff44f2a4a82da13d22061ce73443a125925d
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup testenv using external action
        uses: podman-desktop/e2e/.github/actions/pde2e-testenv-prepare@13e2c57c759137bfc1f437f221967461e8a98e2a

      - name: Remove pre-installed Docker images
        run: |
          echo "Removing pre-installed Docker images to prevent E2E test flakiness"
          docker image ls
          docker image rm --force $(docker image ls -q) 2>/dev/null || true
          docker system prune --all --force 2>/dev/null || true
          echo "Docker images after cleanup:"
          docker image ls

      - name: Create bisect test script
        run: |
          cat > /tmp/bisect-test.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -euo pipefail

          rm -rf dist/
          find . -name 'node_modules' -type d -prune -exec rm -rf '{}' +

          pnpm install
          pnpm run test:e2e:build
          xvfb-run --auto-servernum --server-args='-screen 0 1280x960x24' -- npx playwright test tests/playwright/src/specs/kind.spec.ts --grep-invert @k8s_e2e
          SCRIPT_EOF
          chmod +x /tmp/bisect-test.sh

      - name: Run git bisect
        run: |
          git config user.email "ci@podman-desktop.io"
          git config user.name "CI Bot"

          # Run git bisect
          git bisect start
          git bisect bad ca83d6896961a4cc1dac5835d8fa5d380f2c4406
          git bisect good 10ff3ffc223b8d94674cf4ec3db953385aadaba3

          # Run the bisect with the test script
          git bisect run /tmp/bisect-test.sh

          # Capture the result
          BISECT_RESULT=$(git bisect log)
          echo "BISECT_LOG<<EOF" >> $GITHUB_ENV
          echo "$BISECT_RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Reset bisect
          git bisect reset

      - name: Post bisect results
        if: always()
        run: |
          echo "Git Bisect Results:"
          echo "$BISECT_LOG"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: git-bisect-results
          path: |
            ./tests/**/output/
            !./tests/**/traces/raw
