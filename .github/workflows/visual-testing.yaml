name: visual-testing

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visual-testing:
    name: Screenshots
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install

      - name: Build production binary
        env:
          ELECTRON_ENABLE_INSPECT: true
        run: |
          pnpm compile:current --linux dir
          path=$(realpath ./dist/linux-unpacked/podman-desktop)
          echo "Podman Desktop built binary: $path"
          echo "PODMAN_DESKTOP_BINARY=$path" >> $GITHUB_ENV

      - name: Run visual testing screenshots
        env:
          PLAYWRIGHT_SCREENSHOTS_PATH: ./tests/playwright/output/screenshots
        run: pnpm test:e2e:screenshots

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: visual-testing-screenshots
          path: |
            ./tests/**/output/
            !./tests/**/traces/raw

      - name: Upload screenshots to Argos
        working-directory: tests/playwright
        run: pnpm run argos-ci:upload ./output/screenshots
